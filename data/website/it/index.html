<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Intelligence Network Italia | WeatherArb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #050505; color: #eee; }</style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-8 uppercase tracking-widest border-b border-gray-800 pb-4">Italia <span class="text-blue-500">Nodes</span></h1>
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <p class="text-gray-500">Sincronizzazione nodi...</p>
        </div>
    </div>
    <script>
        async function load() {
            try {
                const r = await fetch('/api/v1/cities.json');
                const cities = await r.json();
                document.getElementById('grid').innerHTML = cities.map(c => `
                    <a href="/it/${c.id}/" class="p-4 border border-gray-800 rounded hover:border-blue-500 transition-all text-center group">
                        <span class="block text-sm font-bold group-hover:text-blue-400">${c.name}</span>
                        <span class="text-[9px] text-gray-600 uppercase">Nodo Attivo</span>
                    </a>
                `).join('');
            } catch (e) { console.error(e); }
        }
        load();
    </script>
</body>
</html>
