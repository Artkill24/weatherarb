<script>
var API='https://artkill24-weatherarb-api.hf.space';
var slug='cento';
var lat=44.7333;
var lon=11.2833;
var LEVELS={CRITICAL:['Critico','#ef4444'],EXTREME:['Estremo','#f97316'],UNUSUAL:['Insolito','#eab308'],NORMAL:['Normale','#10b981']};
async function load(){
  try{
    var r=await fetch(API+'/api/v1/pulse/'+slug);
    if(!r.ok)throw new Error();
    var d=await r.json();
    var z=d.z_score||0;
    var lv=LEVELS[d.anomaly_level]||LEVELS.NORMAL;
    document.getElementById('z-val').textContent=(z>=0?'+':'')+z.toFixed(2)+'σ';
    document.getElementById('z-val').style.color=lv[1];
    document.getElementById('temp-val').textContent=d.temperature_c!=null?d.temperature_c.toFixed(1):'—';
    document.getElementById('hum-val').textContent=d.humidity_pct||'—';
    document.getElementById('wind-val').textContent=d.wind_kmh!=null?d.wind_kmh.toFixed(0):'—';
    document.getElementById('badge-wrap').innerHTML='<span class="badge" style="background:'+lv[1]+'22;color:'+lv[1]+';border-color:'+lv[1]+'44">'+lv[0]+'</span>';
    var absZ=Math.abs(z);
    var txt=absZ>=3?'Cento is recording a critical climate anomaly ('+z.toFixed(2)+'σ). Current conditions deviate significantly from the 25-year NASA baseline.':absZ>=2?'Cento shows an unusual weather pattern today ('+z.toFixed(2)+'σ) compared to historical averages.':'Cento weather is within normal range today ('+z.toFixed(2)+'σ vs NASA POWER 25-year baseline).';
    document.getElementById('analysis').textContent=txt;
  }catch(e){document.getElementById('analysis').textContent='Data loading...';}
  try{
    var r2=await fetch(API+'/api/v1/pulse/nearby?lat='+lat+'&lon='+lon+'&limit=6');
    var nearby=await r2.json();
    if(Array.isArray(nearby)){
      document.getElementById('nearby').innerHTML=nearby.map(function(c){
        var z2=c.z_score||0;
        var col=z2>=3?'#ef4444':z2>=2?'#f97316':z2>=1?'#eab308':z2<=-2?'#3b82f6':'#10b981';
        var s2=(c.comune||c.province||'').toLowerCase().replace(/[^a-z0-9]+/g,'-');
        return '<a href="/'+( c.country_code||'').toLowerCase()+'/'+s2+'/" class="nearby-card"><span>'+( c.comune||c.province)+'</span><span style="font-weight:800;color:'+col+'">'+(z2>=0?'+':'')+z2.toFixed(1)+'σ</span></a>';
      }).join('');
    }
  }catch(e){}
}

async function loadHistory() {
  try {
    const r = await fetch('https://artkill24-weatherarb-api.hf.space/api/v1/history/' + slug);
    const d = await r.json();
    const pts = d.history || [];
    if (!pts.length) {
      document.getElementById('zscore-chart').innerHTML = '<div class="no-data">Dati storici in accumulo — riprova tra qualche ora</div>';
      return;
    }
    const days = {};
    pts.forEach(p => {
      const day = p.recorded_at.slice(0,10);
      if (!days[day] || Math.abs(p.z_score) > Math.abs(days[day].z))
        days[day] = {z: p.z_score, t: p.temperature_c};
    });
    const entries = Object.entries(days).slice(-7);
    const maxZ = Math.max(...entries.map(e => Math.abs(e[1].z)), 1);
    const chart = document.getElementById('zscore-chart');
    const labels = document.getElementById('chart-labels');
    chart.innerHTML = '<div class="chart-zero"></div>';
    labels.innerHTML = '';
    entries.forEach(([day, val]) => {
      const z = val.z;
      const pct = Math.abs(z) / maxZ * 45;
      const col = z>=3?'#ef4444':z>=2?'#f97316':z>=1?'#eab308':z<=-2?'#3b82f6':'#10b981';
      const bar = document.createElement('div');
      bar.className = 'chart-bar';
      bar.style.background = col;
      bar.style.height = (pct+5)+'%';
      bar.style.alignSelf = z < 0 ? 'flex-start' : 'flex-end';
      bar.setAttribute('data-tip', (z>=0?'+':'')+z.toFixed(1)+'σ'+(val.t?' · '+val.t.toFixed(1)+'°C':''));
      chart.appendChild(bar);
      const lbl = document.createElement('span');
      lbl.textContent = day.slice(5);
      labels.appendChild(lbl);
    });
  } catch(e) {
    document.getElementById('zscore-chart').innerHTML = '<div class="no-data">Dati in arrivo...</div>';
  }
}
loadHistory();
load();
</script>
