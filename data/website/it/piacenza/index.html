<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Report: Piacenza — WeatherArb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <style>
        :root { --ink:#0f1117; --paper:#f5f3ee; --electric:#2563eb; }
        body { font-family: ui-sans-serif, system-ui; background: var(--paper); color: var(--ink); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .serif { font-family: 'Instrument Serif', serif; }
    </style>
</head>
<body class="p-6 md:p-12">
    <nav class="max-w-4xl mx-auto flex justify-between items-center mb-16">
        <a href="/" class="font-bold text-xl">⛈ WeatherArb</a>
        <div class="text-[10px] uppercase tracking-widest opacity-50 mono font-bold">Italy / Emilia-Romagna</div>
    </nav>

    <main class="max-w-4xl mx-auto">
        <div class="mb-12">
            <h1 class="text-6xl serif mb-4 italic">Piacenza</h1>
            <p class="text-xl opacity-60">Anomaly Analysis & Strategic Impact Horizon.</p>
        </div>

        <div class="bg-white rounded-3xl p-8 border border-gray-200 shadow-sm mb-12">
            <div class="grid md:grid-cols-2 gap-8 items-center">
                <div>
                    <div class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-2">Live Status</div>
                    <div class="text-4xl font-bold mono mb-4" id="live-z">--</div>
                    <p class="text-sm opacity-70 leading-relaxed">Deviazione statistica calcolata su baseline NASA 2000-2024.</p>
                </div>
                <div class="bg-gray-900 rounded-2xl p-6 text-white">
                    <div class="text-[10px] opacity-50 uppercase tracking-widest mb-1">Impact Horizon</div>
                    <div class="text-5xl font-bold text-orange-400 mono" id="live-horizon">--h</div>
                    <div class="mt-4 text-[10px] font-bold py-1 px-3 bg-orange-400/10 text-orange-400 border border-orange-400/20 rounded-full inline-block">WINDOW OPEN</div>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-6 mb-16 text-center">
            <div class="p-6 border border-gray-100 rounded-2xl bg-white/50">
                <div class="text-xs opacity-50 uppercase mb-2">Confidence</div>
                <div class="text-2xl font-bold mono">94.2%</div>
            </div>
            <div class="p-6 border border-gray-100 rounded-2xl bg-white/50">
                <div class="text-xs opacity-50 uppercase mb-2">Data Source</div>
                <div class="text-2xl font-bold mono text-blue-600">ERA5</div>
            </div>
            <div class="p-6 border border-gray-100 rounded-2xl bg-white/50">
                <div class="text-xs opacity-50 uppercase mb-2">Refresh</div>
                <div class="text-2xl font-bold mono">60m</div>
            </div>
        </div>
    </main>

    <script>
        async function loadLocalData() {
            const res = await fetch(`https://api.weatherarb.com/api/v1/pulse/piacenza`);
            const d = await res.json();
            document.getElementById('live-z').innerText = (d.weather.z_score > 0 ? '+' : '') + d.weather.z_score;
            const h = Math.round(24 * (1 - (d.signal.score-7)/3) + 6);
            document.getElementById('live-horizon').innerText = (d.signal.score >= 7 ? h : '--') + 'h';
        }
        loadLocalData();
    </script>
</body>
</html>
