<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WeatherArb Intelligence Terminal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
    body { background: #05070a; color: #8f9bb3; font-family: 'JetBrains Mono', monospace; }
    .serif { font-family: 'Instrument Serif', serif; }
    .neon-blue { color: #00f2ff; text-shadow: 0 0 10px rgba(0,242,255,0.5); }
    .neon-red { color: #ff0044; text-shadow: 0 0 10px rgba(255,0,68,0.5); }
    .row-active:hover { background: rgba(0,242,255,0.05); cursor: crosshair; }
    .b2b-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); z-index:1000; }
</style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-end mb-12 border-b border-white/10 pb-6">
            <div>
                <h1 class="text-4xl serif text-white mb-2">Live <span class="neon-blue">Anomaly</span> Stream</h1>
                <p class="text-xs tracking-[0.3em] uppercase opacity-50">Global Network: 121 Nodes Active</p>
            </div>
            <div class="text-right hidden md:block">
                <div class="text-[10px] opacity-40 mb-1 uppercase">System Status</div>
                <div class="flex items-center gap-2 font-bold text-green-500">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> NOMINAL / NASA POWER CONNECTED
                </div>
            </div>
        </header>

        <div class="overflow-x-auto bg-[#0a0d14] rounded-2xl border border-white/5 shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-[10px] uppercase tracking-widest border-b border-white/10 bg-white/5">
                        <th class="p-5">Node / Location</th>
                        <th class="p-5">Z-Score</th>
                        <th class="p-5">Intensity</th>
                        <th class="p-5">Impact Horizon</th>
                        <th class="p-5">Action</th>
                    </tr>
                </thead>
                <tbody id="stream-body" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="report-modal" class="b2b-modal flex items-center justify-center p-6">
        <div class="bg-[#0f172a] border border-blue-500/30 p-8 rounded-3xl max-w-2xl w-full shadow-[0_0_50px_rgba(0,0,0,1)]">
            <div class="flex justify-between items-start mb-6">
                <h2 class="text-2xl serif text-white" id="m-title">Intelligence Report</h2>
                <button onclick="closeModal()" class="text-white opacity-50 hover:opacity-100">✕ CLOSE</button>
            </div>
            <div id="m-content" class="text-sm leading-relaxed mb-8 space-y-4 text-blue-100/80">
                </div>
            <div class="flex gap-4">
                <button class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-xs flex-1 uppercase tracking-widest">Download PDF Briefing</button>
                <button class="border border-white/20 text-white px-6 py-3 rounded-xl font-bold text-xs flex-1 uppercase tracking-widest">Share with Terminal</button>
            </div>
        </div>
    </div>

<script>
async function loadTerminalData() {
    const res = await fetch('https://api.weatherarb.com/api/v1/europe/top?limit=100');
    const json = await res.json();
    const body = document.getElementById('stream-body');
    
    body.innerHTML = json.data.map(r => {
        const isCritical = r.score >= 7;
        const horizon = isCritical ? Math.round(24 * (1 - (r.score-7)/3) + 6) + 'h' : 'STABLE';
        return `
            <tr class="row-active transition-all group text-sm">
                <td class="p-5 font-bold text-white">${r.province} <span class="opacity-30 ml-2 font-normal">${r.region}</span></td>
                <td class="p-5 font-bold ${r.z_score > 2 ? 'neon-red' : 'neon-blue'}">${r.z_score > 0 ? '+' : ''}${r.z_score}</td>
                <td class="p-5">
                    <div class="w-24 bg-white/5 h-1.5 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-500 shadow-[0_0_10px_#3b82f6]" style="width: ${r.score*10}%"></div>
                    </div>
                </td>
                <td class="p-5 ${isCritical ? 'text-orange-400 animate-pulse' : 'opacity-40'}">${horizon}</td>
                <td class="p-5 text-right">
                    <button onclick="openB2B('${r.province}', '${r.z_score}', '${horizon}', '${r.event_type}')" 
                            class="text-[9px] font-bold border border-blue-500/50 text-blue-400 px-3 py-1 rounded-md hover:bg-blue-500 hover:text-white transition-all">
                        GEN_REPORT
                    </button>
                </td>
            </tr>
        `;
    }).join('');
}

function openB2B(city, z, horizon, event) {
    document.getElementById('report-modal').style.display = 'flex';
    document.getElementById('m-title').innerText = `Risk Intel: ${city}`;
    document.getElementById('m-content').innerHTML = `
        <p><strong>SUBJECT:</strong> Statistical Anomaly Detection in ${city}</p>
        <p><strong>METRIC:</strong> The current Z-Score is <span class="text-white">+${z}</span> vs NASA POWER 24-year baseline.</p>
        <p><strong>IMPACT HORIZON:</strong> Mitigation window expires in <span class="text-orange-400">${horizon}</span>.</p>
        <p><strong>ANALYSIS:</strong> The event "${event.replace('_',' ')}" shows a high-velocity growth pattern. Local logistics infrastructure and cooling/heating capacity may experience saturation within the preparation window.</p>
        <div class="p-4 bg-black/40 rounded-xl border border-white/5">
            <span class="text-[10px] text-blue-400 uppercase">Recommended Actions:</span>
            <ul class="list-disc ml-4 mt-2 text-xs">
                <li>Pre-position emergency inventory in regional hubs.</li>
                <li>Activate energy consumption alerts for HVAC systems.</li>
                <li>Notify supply chain partners of potential transit delays.</li>
            </ul>
        </div>
    `;
}

function closeModal() { document.getElementById('report-modal').style.display = 'none'; }
loadTerminalData();
setInterval(loadTerminalData, 600000);
</script>
</body>
</html>
