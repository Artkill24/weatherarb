<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WeatherArb • Earth Intelligence v8</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
:root{--cyan:#00F0FF;--alert:#FF3366;--warn:#FF9933;--cold:#3388FF;--ok:#00FF88}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000103;font-family:'Space Mono',monospace;color:#e2e8f0}
#globe-container{position:fixed;inset:0;z-index:1}

/* Scanlines */
body::after{content:'';position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);opacity:.6}

/* Vignette */
body::before{content:'';position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 90% 90% at 50% 50%,transparent 35%,rgba(0,1,3,.88) 100%)}

/* HUD */
#hud{position:fixed;inset:0;z-index:20;pointer-events:none;padding:20px 22px;display:flex;flex-direction:column;justify-content:space-between}
.pa{pointer-events:auto}
.panel{background:rgba(4,12,28,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(0,240,255,.18);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.6)}

/* Top */
#topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;position:relative}

.logo-box{padding:14px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo-icon{width:40px;height:40px;border-radius:50%;border:2px solid var(--cyan);
  display:flex;align-items:center;justify-content:center;background:rgba(0,240,255,.1);
  box-shadow:0 0 18px rgba(0,240,255,.35)}
.logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:.15em;color:#fff}
.logo-text em{color:var(--cyan);font-style:normal}
.logo-sub{font-size:8px;letter-spacing:.2em;color:rgba(0,240,255,.7);margin-top:3px;display:flex;align-items:center;gap:6px}
.pulse{width:6px;height:6px;background:var(--ok);border-radius:50%;box-shadow:0 0 8px var(--ok);animation:blk 1.8s infinite}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.15}}

/* Search */
#sb-wrap{flex:1;max-width:310px;position:relative}
#searchbox{display:flex;align-items:center;gap:9px;background:rgba(4,12,28,.92);
  border:1px solid rgba(0,240,255,.28);border-radius:28px;padding:9px 16px;transition:border-color .2s}
#searchbox:focus-within{border-color:rgba(0,240,255,.8);box-shadow:0 0 14px rgba(0,240,255,.18)}
#cs{background:none;border:none;outline:none;color:#c8e6f0;font-family:'Space Mono',monospace;font-size:11px;width:100%}
#cs::placeholder{color:#2a5a6a}
#sr{position:absolute;top:50px;left:0;width:100%;background:rgba(4,12,28,.98);
  border:1px solid rgba(0,240,255,.25);border-radius:10px;overflow:hidden;display:none;z-index:50;pointer-events:auto}
.sri{padding:11px 15px;font-size:10px;cursor:pointer;border-bottom:1px solid rgba(0,240,255,.08);
  display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.sri:hover{background:rgba(0,240,255,.1)}
.sri-city{color:#c8e6f0;font-weight:700}
.sri-z{font-size:11px;font-weight:700}
.hot{color:var(--alert)}.warn{color:var(--warn)}.cold{color:var(--cold)}.norm{color:var(--ok)}

/* Stats */
#stats-row{display:flex;gap:10px;flex-shrink:0}
.stat-box{padding:13px 18px;text-align:right}
.stat-lbl{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#2a6a7a}
.stat-val{font-size:22px;font-weight:700;font-family:'Syne',sans-serif;color:#fff;line-height:1.1}
.stat-val.c{color:var(--cyan);text-shadow:0 0 12px rgba(0,240,255,.4)}
.stat-val.r{color:var(--alert);text-shadow:0 0 14px rgba(255,51,102,.5)}

/* Bottom */
#bottombar{display:flex;justify-content:space-between;align-items:flex-end;gap:14px}

/* Alert feed */
#feed-box{padding:14px 18px;width:270px}
.feed-title{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(0,240,255,.18)}
.fi{display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,240,255,.03);padding:9px 11px;border-radius:7px;
  border:1px solid rgba(0,240,255,.08);margin-bottom:7px;cursor:pointer;transition:all .2s}
.fi:hover{background:rgba(0,240,255,.08);border-color:rgba(0,240,255,.25)}
.fi-left{display:flex;align-items:center;gap:9px}
.fi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.fi-city{font-size:10px;font-weight:700;color:#e2e8f0}
.fi-z{font-size:12px;font-weight:800}

/* Right controls */
#right-col{display:flex;flex-direction:column;gap:10px;align-items:flex-end}
#legend-box{padding:13px 18px;display:flex;flex-direction:column;gap:7px}
.leg-row{display:flex;align-items:center;gap:9px;font-size:8px;letter-spacing:.1em;color:#1e4a5a}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#btns{display:flex;gap:9px}
.gbtn{padding:11px 18px;font-size:9px;letter-spacing:.15em;text-transform:uppercase;
  cursor:pointer;border-radius:10px;font-family:'Space Mono',monospace;font-weight:700;transition:all .2s}
.gbtn-pri{background:rgba(0,240,255,.08);border:1px solid rgba(0,240,255,.35);color:var(--cyan)}
.gbtn-pri:hover{background:rgba(0,240,255,.18);border-color:var(--cyan)}
.gbtn-sec{background:none;border:1px solid rgba(255,255,255,.1);color:#4a7a8a}

/* UTC */
#utc-box{padding:11px 16px;font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:.08em}

/* Tooltip */
#tip{position:fixed;z-index:60;pointer-events:none;
  background:rgba(4,12,28,.97);border:1px solid rgba(0,240,255,.3);
  border-radius:6px;padding:12px 16px;backdrop-filter:blur(14px);
  opacity:0;transition:opacity .12s;min-width:180px}
#tip.on{opacity:1}
.tip-city{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff;margin-bottom:7px}
.tip-row{display:flex;justify-content:space-between;gap:14px;margin-top:4px}
.tip-l{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:#1e5060}
.tip-v{font-size:11px;font-weight:700;color:var(--cyan)}

/* Toast */
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
  background:rgba(0,240,255,.94);color:#000;font-family:'Space Mono',monospace;
  font-size:10px;font-weight:700;letter-spacing:.1em;padding:11px 22px;
  border-radius:24px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;
  z-index:100;white-space:nowrap;box-shadow:0 8px 28px rgba(0,240,255,.3)}
#toast.show{opacity:1;transform:translate(-50%,-8px)}

/* Loader */
#loader{position:fixed;inset:0;z-index:200;background:#000103;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .7s}
#loader.gone{opacity:0;pointer-events:none}
.lt{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;letter-spacing:.15em;color:#fff}
.lt em{color:var(--cyan);font-style:normal}
.ltrack{width:220px;height:2px;background:rgba(0,240,255,.15);border-radius:2px;overflow:hidden}
.lfill{height:100%;background:var(--cyan);width:0%;transition:width .12s;box-shadow:0 0 10px var(--cyan)}
.lmsg{font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:#2a5a6a}
</style>
</head>
<body>

<div id="loader">
  <div class="lt">Weather<em>Arb</em></div>
  <div class="ltrack"><div class="lfill" id="fill"></div></div>
  <div class="lmsg" id="lmsg">Initializing orbital systems...</div>
</div>

<div id="globe-container"></div>

<div id="hud">
  <div id="topbar">
    <div class="panel logo-box pa">
      <div class="logo-icon">
        <svg width="20" height="20" fill="none" stroke="var(--cyan)" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <div>
        <div class="logo-text">Weather<em>Arb</em></div>
        <div class="logo-sub"><span class="pulse"></span>LIVE INTELLIGENCE</div>
      </div>
    </div>

    <div id="sb-wrap">
      <div id="searchbox" class="pa">
        <svg width="13" height="13" fill="none" stroke="var(--cyan)" stroke-width="2" opacity=".5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="cs" type="text" placeholder="Search city...">
      </div>
      <div id="sr"></div>
    </div>

    <div id="stats-row">
      <div class="panel stat-box pa">
        <div class="stat-lbl">Nodes</div>
        <div class="stat-val c" id="sn">—</div>
      </div>
      <div class="panel stat-box pa">
        <div class="stat-lbl">Critical</div>
        <div class="stat-val r" id="sc">—</div>
      </div>
      <div class="panel stat-box pa">
        <div class="stat-lbl">Countries</div>
        <div class="stat-val" id="scc">—</div>
      </div>
      <div class="panel utc-box pa" id="utc-box">—</div>
    </div>
  </div>

  <div id="bottombar">
    <div class="panel pa" id="feed-box">
      <div class="feed-title">Top Anomalies (&gt;3σ)</div>
      <div id="feed"></div>
    </div>

    <div id="right-col">
      <div class="panel pa" id="legend-box">
        <div style="font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:#1e5060;margin-bottom:6px">Legend</div>
        <div class="leg-row"><div class="leg-dot" style="background:var(--alert);box-shadow:0 0 7px var(--alert)"></div>Heat wave (Z > +2σ)</div>
        <div class="leg-row"><div class="leg-dot" style="background:var(--warn);box-shadow:0 0 7px var(--warn)"></div>Warning (+1→+2σ)</div>
        <div class="leg-row"><div class="leg-dot" style="background:var(--cold);box-shadow:0 0 7px var(--cold)"></div>Cold snap (Z < -2σ)</div>
        <div class="leg-row"><div class="leg-dot" style="background:var(--ok);box-shadow:0 0 7px var(--ok)"></div>Normal</div>
      </div>
      <div id="btns">
        <button class="panel gbtn gbtn-pri pa" onclick="goToMyCity()">📍 My Location</button>
        <button class="panel gbtn gbtn-sec pa" onclick="globe.controls().autoRotate=!globe.controls().autoRotate">⟳ Auto</button>
      </div>
    </div>
  </div>
</div>

<div id="tip">
  <div class="tip-city" id="tc"></div>
  <div class="tip-row"><span class="tip-l">Z-Score</span><span class="tip-v" id="tz"></span></div>
  <div class="tip-row"><span class="tip-l">Score</span><span class="tip-v" id="tsc"></span></div>
  <div class="tip-row"><span class="tip-l">Temp</span><span class="tip-v" id="tt"></span></div>
  <div class="tip-row"><span class="tip-l">Event</span><span class="tip-v" id="te"></span></div>
</div>
<div id="toast"></div>

<!-- Globe.gl -->
<script src="https://unpkg.com/globe.gl@2.30.0/dist/globe.gl.min.js"></script>
<script>
const $=id=>document.getElementById(id);
function prog(p,m){$('fill').style.width=p+'%';$('lmsg').textContent=m}
function toast(msg,dur=2800){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}

let globe, nodesData=[], myLat=null, myLon=null;

function zColor(z){
  if(z>=3) return '#FF3366';
  if(z>=2) return '#FF9933';
  if(z>=1) return '#FFDD22';
  if(z<=-3) return '#0044FF';
  if(z<=-2) return '#3388FF';
  if(z<=-1) return '#66AAFF';
  return '#00F0FF';
}

function zRadius(z){
  const az=Math.abs(z||0);
  return 0.3 + az*0.18;
}

function zAltitude(z){
  const az=Math.abs(z||0);
  return 0.005 + az*0.008;
}

// ─── Init Globe ───────────────────────────────────────────────────────────────
prog(10,'Building globe...');

globe = Globe()
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
  .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
  .atmosphereColor('rgba(0,160,255,0.25)')
  .atmosphereAltitude(0.18)
  .showGraticules(false)
  .onGlobeReady(()=>{
    prog(60,'Globe ready, loading anomaly data...');
    loadNodes();
  })
  ($('globe-container'));

// Camera & controls
globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.4;
globe.controls().enableDamping = true;
globe.controls().dampingFactor = 0.08;
globe.controls().minDistance = 150;
globe.controls().maxDistance = 700;
globe.pointOfView({lat:20, lng:10, altitude:2.2}, 0);

// Resize
function resize(){
  globe.width(innerWidth);
  globe.height(innerHeight);
}
window.addEventListener('resize', resize);
resize();

// ─── Load Data ────────────────────────────────────────────────────────────────
async function loadNodes(){
  try{
    prog(65,'Fetching anomaly data...');
    const r = await fetch('https://api.weatherarb.com/api/v1/europe/top?limit=750');
    const data = await r.json();
    nodesData = data.reports || [];
    prog(85,'Rendering nodes...');
    renderNodes(nodesData);
    updateStats(nodesData);
    buildFeed(nodesData);
    prog(100,'Ready');
    setTimeout(()=>$('loader').classList.add('gone'), 500);
  } catch(e){
    prog(100,'Demo mode');
    setTimeout(()=>$('loader').classList.add('gone'), 500);
  }
}

function renderNodes(data){
  // Points layer
  globe
    .pointsData(data)
    .pointLat(d => d.lat)
    .pointLng(d => d.lon)
    .pointAltitude(d => zAltitude(d.z_score))
    .pointRadius(d => zRadius(d.z_score))
    .pointColor(d => zColor(d.z_score))
    .pointsMerge(false)
    .pointResolution(8)
    .onPointHover(handleHover)
    .onPointClick(d => {
      if(!d) return;
      globe.pointOfView({lat: d.lat, lng: d.lon, altitude: 1.0}, 1200);
      globe.controls().autoRotate = false;
      toast(`📍 ${d.location} — Z: ${(d.z_score||0)>0?'+':''}${(d.z_score||0).toFixed(2)}σ`);
    });

  // Rings for critical anomalies (Z > 2.5)
  const critical = data.filter(d => Math.abs(d.z_score||0) >= 2.5);
  globe
    .ringsData(critical)
    .ringLat(d => d.lat)
    .ringLng(d => d.lon)
    .ringColor(d => t => `${zColor(d.z_score)}${Math.floor((1-t)*255).toString(16).padStart(2,'0')}`)
    .ringMaxRadius(d => 2.5 + Math.abs(d.z_score||0)*0.4)
    .ringPropagationSpeed(1.5)
    .ringRepeatPeriod(d => 1200 + Math.random()*800);

  // Labels for top anomalies
  const topLabels = [...data]
    .filter(d => Math.abs(d.z_score||0) >= 3)
    .sort((a,b) => Math.abs(b.z_score) - Math.abs(a.z_score))
    .slice(0, 12);

  globe
    .labelsData(topLabels)
    .labelLat(d => d.lat)
    .labelLng(d => d.lon)
    .labelAltitude(0.035)
    .labelText(d => `${d.location} ${(d.z_score||0)>0?'+':''}${(d.z_score||0).toFixed(1)}σ`)
    .labelSize(d => 0.4 + Math.abs(d.z_score||0)*0.05)
    .labelColor(d => zColor(d.z_score))
    .labelResolution(3)
    .labelDotRadius(0)
    .labelIncludeDot(false);
}

// ─── Hover tooltip ────────────────────────────────────────────────────────────
const tip = $('tip');
function handleHover(d, prevD, {x, y}){
  if(!d){ tip.classList.remove('on'); return; }
  $('tc').textContent = d.location + ' · ' + (d.country_code||'').toUpperCase();
  const z = d.z_score||0;
  $('tz').textContent = (z>=0?'+':'')+z.toFixed(2)+'σ';
  $('tsc').textContent = (d.score||0).toFixed(1)+'/10';
  $('tt').textContent = d.temperature_c!=null ? d.temperature_c.toFixed(1)+'°C' : '—';
  $('te').textContent = (d.event_type||d.anomaly_level||'—').replace(/_/g,' ');
  tip.style.left = (x+16)+'px';
  tip.style.top = (y-10)+'px';
  tip.classList.add('on');
}
$('globe-container').addEventListener('mousemove', e=>{
  if(!tip.classList.contains('on')) return;
  tip.style.left=(e.clientX+16)+'px'; tip.style.top=(e.clientY-10)+'px';
});

// ─── Stats ────────────────────────────────────────────────────────────────────
function updateStats(data){
  $('sn').textContent = data.length;
  $('sc').textContent = data.filter(d=>Math.abs(d.z_score||0)>=3).length;
  $('scc').textContent = new Set(data.map(d=>d.country_code)).size;
}

// ─── Alert feed ───────────────────────────────────────────────────────────────
function buildFeed(data){
  const top = [...data].filter(d=>Math.abs(d.z_score||0)>=3)
    .sort((a,b)=>Math.abs(b.z_score)-Math.abs(a.z_score)).slice(0,5);
  $('feed').innerHTML = top.map(d=>{
    const z=d.z_score||0, sign=z>=0?'+':'', col=z>=0?'var(--alert)':'var(--cold)';
    return `<div class="fi" onclick="flyTo(${d.lat},${d.lon})">
      <div class="fi-left">
        <span class="fi-dot" style="background:${col};box-shadow:0 0 8px ${col}"></span>
        <span class="fi-city">${d.location}</span>
        <span style="font-size:8px;color:#1e5060">${(d.country_code||'').toUpperCase()}</span>
      </div>
      <span class="fi-z" style="color:${col}">${sign}${z.toFixed(1)}σ</span>
    </div>`;
  }).join('');
}

// ─── Fly to ───────────────────────────────────────────────────────────────────
function flyTo(lat, lng, alt=1.0){
  globe.controls().autoRotate = false;
  globe.pointOfView({lat, lng, altitude: alt}, 1500);
}

// ─── Search ───────────────────────────────────────────────────────────────────
const cs = $('cs'), sr = $('sr');
cs.addEventListener('input', ()=>{
  const q = cs.value.trim().toLowerCase();
  if(q.length < 2){ sr.style.display='none'; return; }
  const m = nodesData.filter(d=>(d.location||'').toLowerCase().includes(q)).slice(0,7);
  if(!m.length){ sr.style.display='none'; return; }
  sr.innerHTML = m.map(d=>{
    const z=(d.z_score||0).toFixed(2), cls=d.z_score>=3?'hot':d.z_score>=2?'warn':d.z_score<=-2?'cold':'norm', sign=d.z_score>=0?'+':'';
    return `<div class="sri" onclick="selectCity(${d.lat},${d.lon},'${(d.location||'').replace(/'/g,'')}')">
      <span class="sri-city">${d.location} <span style="color:#1e4050;font-size:8px">${(d.country_code||'').toUpperCase()}</span></span>
      <span class="sri-z ${cls}">${sign}${z}σ</span></div>`;
  }).join('');
  sr.style.display='block';
});
cs.addEventListener('keydown', e=>{ if(e.key==='Escape'){sr.style.display='none';cs.value='';} });
document.addEventListener('click', e=>{ if(!e.target.closest('#sb-wrap')) sr.style.display='none'; });

function selectCity(lat, lng, name){
  cs.value=name; sr.style.display='none'; flyTo(lat,lng); toast(`🔍 ${name}`);
}

// ─── My Location ─────────────────────────────────────────────────────────────
function goToMyCity(){
  if(myLat !== null){ doFlyToMe(); return; }
  if(!navigator.geolocation){ toast('⚠️ Geolocation not supported'); return; }
  toast('📡 Detecting location...', 3500);
  navigator.geolocation.getCurrentPosition(pos=>{
    myLat=pos.coords.latitude; myLon=pos.coords.longitude; doFlyToMe();
  }, ()=>toast('⚠️ Location access denied'));
}

function doFlyToMe(){
  flyTo(myLat, myLon, 0.8);
  // Add my location marker
  const myNode = [{lat:myLat, lon:myLon, location:'You', z_score:0, _isMe:true}];
  globe.ringsData([...nodesData.filter(d=>Math.abs(d.z_score||0)>=2.5), ...myNode.map(d=>({...d,_isMe:true}))]);
  let nearest=null,minD=999;
  nodesData.forEach(d=>{const dist=Math.sqrt((d.lat-myLat)**2+(d.lon-myLon)**2);if(dist<minD){minD=dist;nearest=d;}});
  toast(`🌍 ${nearest?nearest.location:'Your location'}`);
}

// ─── UTC Clock ────────────────────────────────────────────────────────────────
function tickClock(){
  const d=new Date();
  $('utc-box').textContent=d.getUTCHours().toString().padStart(2,'0')+':'+d.getUTCMinutes().toString().padStart(2,'0')+':'+d.getUTCSeconds().toString().padStart(2,'0')+' UTC';
}
tickClock(); setInterval(tickClock,1000);
</script>
</body>
</html>
