<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WeatherArb • Real-Time Earth Terminal v7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
:root{--navy:#0A192F;--cyan:#00F0FF;--alert:#FF3366;--warn:#FF9933;--cold:#3388FF;--ok:#00FF88}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000103;color:#e2e8f0;font-family:'Space Mono',monospace;overflow:hidden;width:100vw;height:100vh;user-select:none}
#canvas-container{position:fixed;inset:0;z-index:1;cursor:grab}
#canvas-container:active{cursor:grabbing}
.scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0.25;
  background:linear-gradient(rgba(0,0,0,0) 50%,rgba(0,0,0,.22) 50%),linear-gradient(90deg,rgba(255,0,0,.04),rgba(0,255,0,.02),rgba(0,0,255,.04));
  background-size:100% 4px,3px 100%}
#labels-container{position:fixed;inset:0;z-index:5;pointer-events:none}
.node-label{position:absolute;transform:translate(-50%,-50%);
  background:rgba(5,15,30,.9);border-left:2px solid var(--cyan);
  padding:6px 10px;border-radius:0 6px 6px 0;font-size:10px;color:#fff;
  white-space:nowrap;transition:opacity .2s, transform 0.1s;box-shadow:0 4px 15px rgba(0,0,0,.8);
  display:flex;flex-direction:column;gap:2px}
.node-label::before{content:'';position:absolute;left:-16px;top:50%;transform:translateY(-50%);
  width:16px;height:1px;background:var(--cyan)}
.node-label.alert{border-left-color:var(--alert)}
.node-label.alert::before{background:var(--alert)}
.node-label.cold{border-left-color:var(--cold)}
.node-label.cold::before{background:var(--cold)}
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:24px}
.pointer-auto{pointer-events:auto}
.panel{background:rgba(5,15,35,.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(0,240,255,.15);box-shadow:0 8px 32px rgba(0,0,0,.6);border-radius:12px}
.pulse-dot{width:8px;height:8px;background:var(--cyan);border-radius:50%;display:inline-block;
  box-shadow:0 0 10px var(--cyan);animation:pulse 2s infinite}
@keyframes pulse{0%{transform:scale(.95);box-shadow:0 0 0 0 rgba(0,240,255,.8)}70%{transform:scale(1);box-shadow:0 0 0 8px rgba(0,240,255,0)}100%{transform:scale(.95);box-shadow:0 0 0 0 rgba(0,240,255,0)}}
#searchbox{display:flex;align-items:center;gap:10px;background:rgba(5,15,35,.9);
  border:1px solid rgba(0,240,255,.3);border-radius:30px;padding:10px 18px;
  transition:border-color .2s;max-width:300px;width:100%}
#searchbox:focus-within{border-color:rgba(0,240,255,.9);box-shadow:0 0 15px rgba(0,240,255,.2)}
#citysearch{background:none;border:none;outline:none;color:#c8e6f0;
  font-family:'Space Mono',monospace;font-size:12px;width:100%}
#citysearch::placeholder{color:#2a5a70}
#searchresults{position:absolute;top:74px;left:50%;transform:translateX(-50%);
  width:300px;background:rgba(5,15,35,.98);border:1px solid rgba(0,240,255,.3);
  border-radius:10px;overflow:hidden;display:none;z-index:100;pointer-events:auto}
.sr-item{padding:12px 16px;font-size:11px;cursor:pointer;
  border-bottom:1px solid rgba(0,240,255,.1);
  display:flex;justify-content:space-between;align-items:center;transition:background .2s}
.sr-item:hover{background:rgba(0,240,255,.12)}
.sr-city{color:#c8e6f0;font-weight:700}
.sr-z.hot{color:var(--alert)}.sr-z.warn{color:var(--warn)}.sr-z.cold{color:var(--cold)}.sr-z.norm{color:var(--ok)}
.alert-item{display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,240,255,.03);padding:10px 12px;border-radius:8px;
  border:1px solid rgba(0,240,255,.1);margin-bottom:8px}
.alert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:rgba(0,240,255,.95);color:#000;font-family:'Space Mono',monospace;
  font-size:11px;font-weight:700;letter-spacing:.1em;padding:12px 24px;
  border-radius:30px;opacity:0;pointer-events:none;transition:opacity .3s, transform .3s;z-index:200;white-space:nowrap;
  box-shadow:0 10px 30px rgba(0,240,255,.3)}
#toast.show{opacity:1;transform:translate(-50%, -10px)}
#loader{position:fixed;inset:0;z-index:300;background:#000103;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .8s ease-in-out}
#loader.gone{opacity:0;pointer-events:none}
.load-title{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;letter-spacing:.15em;color:#fff}
.load-title em{color:var(--cyan);font-style:normal}
.load-track{width:240px;height:2px;background:rgba(0,240,255,.15);border-radius:2px;overflow:hidden}
.load-fill{height:100%;background:var(--cyan);width:0%;transition:width .15s;box-shadow:0 0 10px var(--cyan)}
.load-msg{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:#2a5a70}
</style>
</head>
<body>

<div id="loader">
  <div class="load-title">Weather<em>Arb</em></div>
  <div class="load-track"><div class="load-fill" id="fill"></div></div>
  <div class="load-msg" id="lmsg">Avvio sincronizzazione orbitale...</div>
</div>

<div id="canvas-container"></div>
<div class="scanlines"></div>
<div id="labels-container"></div>

<div id="hud">
  <header style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;position:relative">
    <div class="panel pointer-auto" style="padding:16px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0">
      <div style="width:42px;height:42px;border-radius:50%;border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;background:rgba(0,240,255,.1);box-shadow:0 0 20px rgba(0,240,255,.3)">
        <svg width="20" height="20" fill="none" stroke="var(--cyan)" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <div>
        <div style="font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:.15em;color:#fff">Weather<span style="color:var(--cyan)">Arb</span></div>
        <div style="display:flex;align-items:center;gap:6px;font-size:9px;color:rgba(0,240,255,.8);margin-top:4px">
          <span class="pulse-dot"></span><span>LIVE INTELLIGENCE</span>
        </div>
      </div>
    </div>

    <div style="flex:1;max-width:320px;position:relative;display:flex;justify-content:center">
      <div id="searchbox" class="pointer-auto">
        <svg width="14" height="14" fill="none" stroke="var(--cyan)" stroke-width="2" opacity=".6" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="citysearch" type="text" placeholder="Cerca città...">
      </div>
      <div id="searchresults"></div>
    </div>

    <div style="display:flex;gap:12px;flex-shrink:0">
      <div class="panel pointer-auto" style="padding:14px 20px;text-align:right">
        <div style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#4a7a8a">Nodi</div>
        <div style="font-size:24px;font-weight:700;color:#fff;font-family:'Syne',sans-serif" id="node-count">—</div>
      </div>
      <div class="panel pointer-auto" style="padding:14px 20px;text-align:right">
        <div style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#4a7a8a">Allarmi</div>
        <div style="font-size:24px;font-weight:700;color:var(--alert);font-family:'Syne',sans-serif;text-shadow:0 0 15px rgba(255,51,102,.6)" id="crit-count">—</div>
      </div>
      <div class="panel pointer-auto" style="padding:14px 20px;text-align:right">
        <div style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#4a7a8a">UTC</div>
        <div style="font-size:14px;font-weight:700;color:var(--cyan);margin-top:6px" id="clock">—</div>
      </div>
    </div>
  </header>

  <footer style="display:flex;justify-content:space-between;align-items:flex-end;gap:16px">
    <div class="panel pointer-auto" style="padding:16px 20px;width:280px">
      <div style="font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(0,240,255,.2)">TOP ANOMALIE (&gt;3σ)</div>
      <div id="alert-feed"></div>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;align-items:flex-end">
      <div class="panel pointer-auto" style="padding:14px 20px;display:flex;flex-direction:column;gap:8px">
        <div style="font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#2a6a8a;margin-bottom:6px">Legenda</div>
        <div style="display:flex;align-items:center;gap:10px;font-size:9px;color:#c8e6f0"><span style="width:8px;height:8px;border-radius:50%;background:var(--alert);box-shadow:0 0 8px var(--alert);flex-shrink:0;display:inline-block"></span>Ondata calore (Z > +2σ)</div>
        <div style="display:flex;align-items:center;gap:10px;font-size:9px;color:#c8e6f0"><span style="width:8px;height:8px;border-radius:50%;background:var(--warn);box-shadow:0 0 8px var(--warn);flex-shrink:0;display:inline-block"></span>Pre-allarme (+1→+2σ)</div>
        <div style="display:flex;align-items:center;gap:10px;font-size:9px;color:#c8e6f0"><span style="width:8px;height:8px;border-radius:50%;background:var(--cold);box-shadow:0 0 8px var(--cold);flex-shrink:0;display:inline-block"></span>Ondata gelo (Z < -2σ)</div>
      </div>
      <div style="display:flex;gap:10px">
        <button onclick="goToMyCity()" class="panel pointer-auto" style="padding:12px 20px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--cyan);cursor:pointer;background:rgba(0,240,255,0.05);border:1px solid rgba(0,240,255,.4);border-radius:10px;transition:all .2s;font-family:'Space Mono',monospace;font-weight:bold">
          📍 Trova Posizione
        </button>
        <div class="panel pointer-auto" style="padding:12px 18px;font-size:9px;color:#4a7a8a;letter-spacing:.12em;display:flex;align-items:center">
          Ruota · Zoom · Hover
        </div>
      </div>
    </div>
  </footer>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
let scene, camera, renderer, theClock, controls;
let globeMesh, cloudsMesh, atmosMesh, earthShaderMaterial;
let sunLight, sunMesh, moonLight, moonMesh;
let pointCloud, nodeGroup, weatherFX=[], labelEls=[];
let nodesData=[];
let myLat=null, myLon=null, myMarker=null;
const R=1;
const labelsContainer=document.getElementById('labels-container');

const $=id=>document.getElementById(id);
function prog(p,m){$('fill').style.width=p+'%';$('lmsg').textContent=m}
function toast(msg,dur=3000){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}

function latLon3D(lat,lon,r){
  const phi=(90-lat)*Math.PI/180, theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-(r*Math.sin(phi)*Math.cos(theta)), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
}

function nodeColor(z){
  if(z>=3) return 0xFF3366; if(z>=2) return 0xFF9933; if(z>=1) return 0xFFDD22;
  if(z<=-3) return 0x0044FF; if(z<=-2) return 0x3388FF; if(z<=-1) return 0x66AAFF;
  return 0x00F0FF;
}

function makeCircleTex(){
  const c=document.createElement('canvas'); c.width=64; c.height=64;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(.4,'rgba(255,255,255,.8)');
  g.addColorStop(.8,'rgba(255,255,255,.15)'); g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

window.onload=function(){
  prog(5,'Inizializzazione motore 3D...');
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x000103,.03);
  camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,1000);
  camera.position.set(0,.5,3.5);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  $('canvas-container').appendChild(renderer.domElement);
  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true; controls.dampingFactor=.05;
  controls.enablePan=false; controls.minDistance=1.2; controls.maxDistance=8;
  theClock=new THREE.Clock();
  nodeGroup=new THREE.Group(); scene.add(nodeGroup);
  prog(15,'Stelle e pianeti...'); buildStarsAndPlanets();
  prog(28,'Terra Day/Night shader...'); buildEarthShader();
  prog(45,'Sole & Luna astronomici...'); buildSunAndMoon();
  prog(58,'Atmosfera...'); buildAtmosphere();
  setupSearch();
  prog(72,'Caricamento dati anomalie...');
  loadNodes();
  animate();
  setInterval(tickClock,1000); tickClock();
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
};

function buildStarsAndPlanets(){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(8000*3);
  for(let i=0;i<8000;i++){
    const r=80+Math.random()*120,t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(p)*Math.cos(t); pos[i*3+1]=r*Math.sin(p)*Math.sin(t); pos[i*3+2]=r*Math.cos(p);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.07,color:0xffffff,transparent:true,opacity:.6,sizeAttenuation:true})));
  // Pianeti visibili
  const pGeo=new THREE.BufferGeometry();
  pGeo.setAttribute('position',new THREE.Float32BufferAttribute([15,8,-30,-25,12,-20,35,-15,-40],3));
  pGeo.setAttribute('color',new THREE.Float32BufferAttribute([1,.9,.8,1,.4,.2,.9,.8,.7],3));
  scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({vertexColors:true,sizeAttenuation:true,map:makeCircleTex(),transparent:true,opacity:.9,blending:THREE.AdditiveBlending,size:.5})));
}

function buildEarthShader(){
  earthShaderMaterial=new THREE.ShaderMaterial({
    uniforms:{dayTex:{value:null},nightTex:{value:null},sunDir:{value:new THREE.Vector3(1,0,0)}},
    vertexShader:`varying vec2 vUv;varying vec3 vNormalWorld;void main(){vUv=uv;vNormalWorld=normalize((modelMatrix*vec4(normal,0.0)).xyz);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`uniform sampler2D dayTex;uniform sampler2D nightTex;uniform vec3 sunDir;varying vec2 vUv;varying vec3 vNormalWorld;void main(){vec3 dayColor=texture2D(dayTex,vUv).rgb;vec3 nightColor=texture2D(nightTex,vUv).rgb;float lightIntensity=dot(vNormalWorld,normalize(sunDir));float blend=smoothstep(-0.2,0.2,lightIntensity);vec3 finalColor=mix(nightColor,dayColor*(lightIntensity+0.2),blend);gl_FragColor=vec4(finalColor,1.0);}`
  });
  globeMesh=new THREE.Mesh(new THREE.SphereGeometry(R,128,128),earthShaderMaterial);
  globeMesh.rotation.y=-Math.PI/2;
  scene.add(globeMesh);
  const loader=new THREE.TextureLoader();
  loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg',t=>{earthShaderMaterial.uniforms.dayTex.value=t;});
  loader.load('https://unpkg.com/three-globe/example/img/earth-night.jpg',t=>{earthShaderMaterial.uniforms.nightTex.value=t;});
}

function buildAtmosphere(){
  const atmosMat=new THREE.ShaderMaterial({
    vertexShader:`varying vec3 vNormal;void main(){vNormal=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vNormal;void main(){float intensity=pow(0.65-dot(vNormal,vec3(0,0,1.0)),4.0);gl_FragColor=vec4(0.3,0.6,1.0,1.0)*intensity*1.5;}`,
    transparent:true,blending:THREE.AdditiveBlending,side:THREE.BackSide,depthWrite:false
  });
  atmosMesh=new THREE.Mesh(new THREE.SphereGeometry(R*1.15,64,64),atmosMat);
  scene.add(atmosMesh);
  new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-clouds10k.png',tex=>{
    cloudsMesh=new THREE.Mesh(new THREE.SphereGeometry(R*1.012,64,64),
      new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity:.3,blending:THREE.AdditiveBlending,depthWrite:false}));
    scene.add(cloudsMesh);
  });
}

function buildSunAndMoon(){
  sunLight=new THREE.DirectionalLight(0xffffff,2.5); scene.add(sunLight);
  sunMesh=new THREE.Mesh(new THREE.SphereGeometry(.8,32,32),
    new THREE.MeshBasicMaterial({color:0xffffee,transparent:true,opacity:.9,fog:false}));
  scene.add(sunMesh);
  moonLight=new THREE.DirectionalLight(0x8ab8d0,.4); scene.add(moonLight);
  moonMesh=new THREE.Mesh(new THREE.SphereGeometry(.12,32,32),
    new THREE.MeshStandardMaterial({color:0xdddddd,roughness:.8}));
  scene.add(moonMesh);
  new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/moon_1024.jpg',tex=>{moonMesh.material.map=tex;moonMesh.material.needsUpdate=true;});
  updateAstroPositions();
}

function updateAstroPositions(){
  const now=new Date();
  const dayOfYear=Math.floor((now-(new Date(now.getFullYear(),0,0)))/86400000);
  const utcH=now.getUTCHours()+now.getUTCMinutes()/60+now.getUTCSeconds()/3600;
  const sunLat=-23.44*Math.cos((360/365)*(dayOfYear+10)*Math.PI/180);
  const sunLon=180-(utcH*15);
  const sunPos=latLon3D(sunLat,sunLon,35);
  sunLight.position.copy(sunPos); sunMesh.position.copy(sunPos);
  if(earthShaderMaterial) earthShaderMaterial.uniforms.sunDir.value.copy(sunPos).normalize();
  const lunarPhase=(dayOfYear%29.53)/29.53;
  const moonPos=latLon3D(sunLat+5.1,sunLon-(lunarPhase*360),4.5);
  moonLight.position.copy(moonPos); moonMesh.position.copy(moonPos); moonMesh.lookAt(0,0,0);
}

async function loadNodes(){
  try{
    const r=await fetch('https://api.weatherarb.com/api/v1/europe/top?limit=750');
    const data=await r.json();
    nodesData=data.reports||[];
    prog(90,'Rendering layer AI...');
    buildNodesMesh(nodesData);
    buildLabels(nodesData.filter(n=>Math.abs(n.z_score||0)>=3).slice(0,12));
    buildWeatherFX(nodesData);
    updateStats(nodesData);
    buildAlertFeed(nodesData);
    prog(100,'Sistemi operativi');
    setTimeout(()=>$('loader').classList.add('gone'),600);
  }catch(e){
    prog(100,'Modalità simulazione');
    nodesData=Array.from({length:300},(_,i)=>({location:`Node-${i}`,lat:(Math.random()-.5)*140,lon:(Math.random()-.5)*360,z_score:(Math.random()-.5)*6}));
    ['Milano','Tokyo','New York','Mumbai','Delhi','Calgary'].forEach((name,i)=>{
      nodesData.push({location:name,country_code:'--',lat:[45.46,35.67,40.71,19.07,28.61,51.04][i],lon:[9.19,139.65,-74,-72.87,77.2,-114.07][i],z_score:[3.2,4.1,-3.5,5.0,3.8,-3.2][i]});
    });
    buildNodesMesh(nodesData);
    buildLabels(nodesData.filter(n=>Math.abs(n.z_score)>=3).slice(0,10));
    updateStats(nodesData);
    buildAlertFeed(nodesData);
    setTimeout(()=>$('loader').classList.add('gone'),600);
  }
}

function buildNodesMesh(data){
  if(pointCloud) scene.remove(pointCloud);
  const pos=[], col=[];
  data.forEach(n=>{
    const p=latLon3D(n.lat,n.lon,R+.015);
    pos.push(p.x,p.y,p.z);
    const c=new THREE.Color(nodeColor(n.z_score||0));
    col.push(c.r,c.g,c.b);
  });
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  pointCloud=new THREE.Points(geo,new THREE.PointsMaterial({
    size:.055,map:makeCircleTex(),vertexColors:true,transparent:true,opacity:.95,
    sizeAttenuation:true,depthWrite:false,blending:THREE.AdditiveBlending
  }));
  // Add to globeMesh so nodes rotate with the earth
  nodeGroup.add(pointCloud);
}

function buildLabels(criticals){
  labelEls.forEach(i=>i.el.remove()); labelEls=[];
  criticals.forEach(n=>{
    const z=n.z_score||0;
    const cls=z>=3?'alert':z<=-3?'cold':'';
    const icon=z>0?'▲':'▼';
    const col=z>=3?'var(--alert)':z<=-3?'var(--cold)':'var(--warn)';
    const el=document.createElement('div');
    el.className=`node-label ${cls}`;
    el.innerHTML=`<span style="font-size:9px;color:#8aabc0;text-transform:uppercase">${n.location}</span><span style="font-weight:700;font-size:13px;color:${col}">${icon} ${z.toFixed(1)}σ</span>`;
    labelsContainer.appendChild(el);
    labelEls.push({el,pos3D:latLon3D(n.lat,n.lon,R+.02)});
  });
}

function updateLabels(){
  const wh=innerWidth/2,hh=innerHeight/2;
  labelEls.forEach(item=>{
    const wp=item.pos3D.clone().applyMatrix4(nodeGroup.matrixWorld);
    const normal=wp.clone().sub(globeMesh.position).normalize();
    const view=camera.position.clone().sub(wp).normalize();
    if(normal.dot(view)>0.1){
      item.el.style.opacity='1';
      const sp=wp.clone().project(camera);
      item.el.style.left=`${sp.x*wh+wh+15}px`;
      item.el.style.top=`${-sp.y*hh+hh}px`;
    } else { item.el.style.opacity='0'; }
  });
}

function buildWeatherFX(data){
  weatherFX.forEach(o=>scene.remove(o)); weatherFX=[];
  const top=[...data].sort((a,b)=>Math.abs(b.z_score)-Math.abs(a.z_score)).slice(0,10);
  top.forEach(n=>{
    const z=n.z_score||0;
    const center=latLon3D(n.lat,n.lon,R+.02);
    const normal=center.clone().normalize();
    if(z>=2) addSunFX(center,normal,z);
    else if(z<=-2) addRainFX(center,normal,z);
  });
}

function addSunFX(center,normal,z){
  const intensity=Math.min(Math.abs(z)/5,1);
  const col=z>=3?new THREE.Color(1,.1,0):new THREE.Color(1,.65,0);
  const glow=new THREE.Mesh(new THREE.SphereGeometry(.038+intensity*.025,12,12),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.6,depthWrite:false,blending:THREE.AdditiveBlending}));
  glow.position.copy(center); glow.userData={type:'sun',phase:Math.random()*Math.PI*2};
  nodeGroup.add(glow); weatherFX.push(glow);
  const up=Math.abs(normal.y)<.9?new THREE.Vector3(0,1,0):new THREE.Vector3(1,0,0);
  const tang=new THREE.Vector3().crossVectors(normal,up).normalize();
  const bitan=new THREE.Vector3().crossVectors(normal,tang).normalize();
  for(let i=0;i<8+Math.floor(intensity*6);i++){
    const a=(i/(8+Math.floor(intensity*6)))*Math.PI*2;
    const dir=tang.clone().multiplyScalar(Math.cos(a)).add(bitan.clone().multiplyScalar(Math.sin(a)));
    const len=.05+Math.random()*.07;
    const ray=new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([center.clone().add(dir.clone().multiplyScalar(.042)),center.clone().add(dir.clone().multiplyScalar(.042+len))]),
      new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.5,depthWrite:false,blending:THREE.AdditiveBlending})
    );
    ray.userData={type:'sunray',phase:Math.random()*Math.PI*2};
    nodeGroup.add(ray); weatherFX.push(ray);
  }
}

function addRainFX(center,normal,z){
  const intensity=Math.min(Math.abs(z)/5,1);
  const numDrops=50+Math.floor(intensity*60);
  const up=Math.abs(normal.y)<.9?new THREE.Vector3(0,1,0):new THREE.Vector3(1,0,0);
  const tang=new THREE.Vector3().crossVectors(normal,up).normalize();
  const bitan=new THREE.Vector3().crossVectors(normal,tang).normalize();
  const positions=[];
  for(let i=0;i<numDrops;i++){
    const a=Math.random()*Math.PI*2, rad=Math.random()*.1;
    const off=tang.clone().multiplyScalar(Math.cos(a)*rad).add(bitan.clone().multiplyScalar(Math.sin(a)*rad));
    const h=Math.random()*.12;
    const from=center.clone().add(normal.clone().multiplyScalar(h)).add(off);
    const to=from.clone().add(normal.clone().multiplyScalar(-.04)).add(off.clone().multiplyScalar(.2));
    positions.push(from.x,from.y,from.z,to.x,to.y,to.z);
  }
  const rain=new THREE.LineSegments(
    new THREE.BufferGeometry().setAttribute('position',new THREE.Float32BufferAttribute(positions,3)),
    new THREE.LineBasicMaterial({color:0x4488ff,transparent:true,opacity:.5,depthWrite:false,blending:THREE.AdditiveBlending})
  );
  rain.userData={type:'rain',normal,center,phase:Math.random()*Math.PI*2};
  nodeGroup.add(rain); weatherFX.push(rain);
}

function updateStats(data){
  $('node-count').textContent=data.length;
  $('crit-count').textContent=data.filter(n=>Math.abs(n.z_score||0)>=3).length;
}

function buildAlertFeed(data){
  const top=[...data].filter(n=>Math.abs(n.z_score||0)>=3).sort((a,b)=>Math.abs(b.z_score)-Math.abs(a.z_score)).slice(0,5);
  $('alert-feed').innerHTML=top.map(n=>{
    const z=n.z_score||0,sign=z>=0?'+':'',col=z>=0?'var(--alert)':'var(--cold)';
    return `<div class="alert-item"><div style="display:flex;align-items:center;gap:10px"><span class="alert-dot" style="background:${col};box-shadow:0 0 10px ${col}"></span><span style="font-size:11px;font-weight:700;color:#e2e8f0">${n.location}</span></div><span style="font-size:13px;font-weight:800;color:${col}">${sign}${z.toFixed(1)}σ</span></div>`;
  }).join('');
}

function setupSearch(){
  const inp=$('citysearch'), res=$('searchresults');
  inp.addEventListener('input',()=>{
    const q=inp.value.trim().toLowerCase();
    if(q.length<2){res.style.display='none';return;}
    const m=nodesData.filter(n=>(n.location||'').toLowerCase().includes(q)).slice(0,6);
    if(!m.length){res.style.display='none';return;}
    res.innerHTML=m.map(n=>{
      const z=(n.z_score||0).toFixed(2),cls=n.z_score>=3?'hot':n.z_score>=2?'warn':n.z_score<=-2?'cold':'norm',sign=n.z_score>=0?'+':'';
      return `<div class="sr-item" onclick="flyToCity(${n.lat},${n.lon},'${(n.location||'').replace(/'/g,'')}')"><span class="sr-city">${n.location}</span><span class="sr-z ${cls}">${sign}${z}σ</span></div>`;
    }).join('');
    res.style.display='block';
  });
  document.addEventListener('click',e=>{if(!e.target.closest('#searchbox')&&!e.target.closest('#searchresults'))res.style.display='none';});
}

function flyToCity(lat,lon,name){$('citysearch').value=name;$('searchresults').style.display='none';flyTo(lat,lon);toast(`Posizionamento: ${name}`);}

function flyTo(lat,lon){
  const target=latLon3D(lat,lon,R*2.8);
  const start=camera.position.clone();
  let step=0;
  function s_(){step+=.02;if(step<=1){camera.position.lerpVectors(start,target,step);camera.lookAt(0,0,0);requestAnimationFrame(s_);}else controls.update();}
  s_();
}

function goToMyCity(){
  if(myLat!==null){doFlyToMe();return;}
  if(!navigator.geolocation){toast('⚠️ GPS non supportato');return;}
  toast('📡 Rilevamento coordinate...',4000);
  navigator.geolocation.getCurrentPosition(pos=>{myLat=pos.coords.latitude;myLon=pos.coords.longitude;doFlyToMe();},()=>toast('⚠️ Accesso negato'));
}

function doFlyToMe(){
  flyTo(myLat,myLon);
  if(myMarker) scene.remove(myMarker);
  const p=latLon3D(myLat,myLon,R+.025);
  myMarker=new THREE.Mesh(new THREE.SphereGeometry(.025,16,16),
    new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:.9,blending:THREE.AdditiveBlending,depthWrite:false}));
  myMarker.position.copy(p); scene.add(myMarker);
  let nearest=null,minD=999;
  nodesData.forEach(n=>{const d=Math.sqrt((n.lat-myLat)**2+(n.lon-myLon)**2);if(d<minD){minD=d;nearest=n;}});
  toast(`🌍 ${nearest?nearest.location:'Posizione rilevata'}`);
}

function tickClock(){
  const d=new Date();
  $('clock').textContent=d.getUTCHours().toString().padStart(2,'0')+':'+d.getUTCMinutes().toString().padStart(2,'0')+':'+d.getUTCSeconds().toString().padStart(2,'0');
  if(sunLight) updateAstroPositions();
}

function animate(){
  requestAnimationFrame(animate);
  const t=theClock.getElapsedTime();
  controls.update();
  if(cloudsMesh) cloudsMesh.rotation.y=t*.003;
  if(nodeGroup) nodeGroup.rotation.y=globeMesh.rotation.y;
  if(myMarker) myMarker.scale.setScalar(1+Math.sin(t*4)*.3);
  weatherFX.forEach(fx=>{
    const ph=fx.userData.phase||0;
    if(fx.userData.type==='sun'){fx.material.opacity=.4+Math.abs(Math.sin(t*2+ph))*.5;fx.scale.setScalar(1+Math.sin(t*2+ph)*.15);}
    if(fx.userData.type==='sunray'){fx.material.opacity=.25+Math.abs(Math.sin(t*2.5+ph))*.45;}
    if(fx.userData.type==='rain'){
      const pos=fx.geometry.attributes.position.array;
      const n=fx.userData.normal;const spd=.0025;
      for(let i=0;i<pos.length;i+=6){
        pos[i]-=n.x*spd;pos[i+1]-=n.y*spd;pos[i+2]-=n.z*spd;
        pos[i+3]-=n.x*spd;pos[i+4]-=n.y*spd;pos[i+5]-=n.z*spd;
        const dx=pos[i]-fx.userData.center.x,dy=pos[i+1]-fx.userData.center.y,dz=pos[i+2]-fx.userData.center.z;
        if(dx*dx+dy*dy+dz*dz>.03){
          const a=Math.random()*Math.PI*2,r=Math.random()*.12;
          const up=Math.abs(n.y)<.9?new THREE.Vector3(0,1,0):new THREE.Vector3(1,0,0);
          const tt=new THREE.Vector3().crossVectors(n,up).normalize();
          const bb=new THREE.Vector3().crossVectors(n,tt).normalize();
          const off=tt.multiplyScalar(Math.cos(a)*r).add(bb.multiplyScalar(Math.sin(a)*r));
          const h=.1+Math.random()*.08;
          const from=fx.userData.center.clone().add(n.clone().multiplyScalar(h)).add(off);
          const to=from.clone().add(n.clone().multiplyScalar(-.05)).add(off.clone().multiplyScalar(.1));
          pos[i]=from.x;pos[i+1]=from.y;pos[i+2]=from.z;pos[i+3]=to.x;pos[i+4]=to.y;pos[i+5]=to.z;
        }
      }
      fx.geometry.attributes.position.needsUpdate=true;
    }
  });
  updateLabels();
  renderer.render(scene,camera);
}
</script>
