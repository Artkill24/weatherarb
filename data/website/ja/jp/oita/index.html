<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ōitaの天気 今日 — Z-Score気候異常指数 | WeatherArb</title>
<meta name="description" content="Ōita、日本のリアルタイム気象データ。NASA POWER 25年ベースラインとのZ-Score比較。気温、湿度、風速。毎時更新。">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#040608;color:#c8d6e5;font-family:-apple-system,sans-serif;min-height:100vh}
.hdr{border-bottom:1px solid #141920;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(4,6,8,.95);backdrop-filter:blur(12px);z-index:10}
.logo{font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#c8d6e5;text-decoration:none}
.logo span{color:#3b82f6}
.wrap{max-width:900px;margin:0 auto;padding:48px 24px}
.breadcrumb{font-size:12px;color:#4a5568;margin-bottom:24px}
.breadcrumb a{color:#4a5568;text-decoration:none}
h1{font-size:38px;font-weight:900;color:#fff;margin-bottom:8px;line-height:1.2}
.subtitle{font-size:15px;color:#4a5568;margin-bottom:32px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.card{background:#0a0d12;border:1px solid #141920;border-radius:16px;padding:24px}
.card-label{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#4a5568;margin-bottom:8px}
.card-val{font-size:36px;font-weight:900;color:#fff}
.card-unit{font-size:13px;color:#4a5568;margin-top:4px}
.section{background:#0a0d12;border:1px solid #141920;border-radius:16px;padding:28px;margin-bottom:20px}
.stitle{font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:#4a5568;margin-bottom:16px}
</style>
</head>
<body>
<header class="hdr">
  <a href="/" class="logo">WEATHER<span>ARB</span></a>
  <nav><a style="font-size:11px;color:#4a5568;text-decoration:none;margin-left:16px" href="/ja/jp/oita/">日本語</a> <a style="font-size:11px;color:#4a5568;text-decoration:none;margin-left:16px" href="/ja/jp/oita/">English</a></nav>
</header>
<main class="wrap">
  <div class="breadcrumb">
    <a href="/">WeatherArb</a>  /  <span>日本語</span>  /  <span>日本</span> / Ōita
  </div>
  <h1>Ōitaの今日の天気</h1>
  <p class="subtitle">日本 · NASA POWER 25年ベースライン · 33.23°N 131.61°E</p>
  <div class="cards">
    <div class="card">
      <div class="card-label">Z-Scoreインデックス</div>
      <div class="card-val" id="z-val" style="color:#f97316">...</div>
      <div class="card-unit">歴史的平均との比較</div>
    </div>
    <div class="card">
      <div class="card-label">気温</div>
      <div class="card-val" id="temp-val">...</div>
      <div class="card-unit">摂氏</div>
    </div>
    <div class="card">
      <div class="card-label">湿度</div>
      <div class="card-val" id="hum-val">...</div>
      <div class="card-unit">%</div>
    </div>
    <div class="card">
      <div class="card-label">風速</div>
      <div class="card-val" id="wind-val">...</div>
      <div class="card-unit">km/h</div>
    </div>
  </div>
  <div class="section">
    <div class="stitle">WeatherArb Analysis</div>
    <div id="analysis" style="font-size:14px;color:#4a5568;line-height:1.7">データを読み込み中...</div>
  </div>
  <div class="section">
    <div class="stitle">Methodology</div>
    <p style="font-size:14px;color:#4a5568;line-height:1.8">WeatherArbはŌitaのNASA POWER 25年ベースラインと比較してZ-ScoreとHDD/CDDデータを計算します。</p>
  </div>
</main>
<script>
const API = 'https://artkill24-weatherarb-api.hf.space';
const slug = 'oita';
const LEVELS = {"CRITICAL": ["\u5371\u6a5f\u7684", "#ef4444"], "EXTREME": ["\u6975\u7aef", "#f97316"], "UNUSUAL": ["\u7570\u5e38", "#eab308"], "NORMAL": ["\u6b63\u5e38", "#10b981"]};
async function load() {
  try {
    const r = await fetch(`${API}/api/v1/pulse/${slug}`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    const z = d.z_score || 0;
    const level = d.anomaly_level || 'NORMAL';
    const [label, color] = LEVELS[level] || ['Normal', '#10b981'];
    document.getElementById('z-val').textContent = (z>=0?'+':'') + z.toFixed(2) + 'σ';
    document.getElementById('z-val').style.color = color;
    document.getElementById('temp-val').textContent = d.temperature_c?.toFixed(1) || '--';
    document.getElementById('hum-val').textContent = d.humidity_pct || '--';
    document.getElementById('wind-val').textContent = d.wind_kmh?.toFixed(0) || '--';
    const absZ = Math.abs(z);
    let analysis = '';
    if (absZ >= 3) analysis = `Ōitaは今日、Z-Score ${{z.toFixed(2)}}σで深刻な気候異常を記録しています。`;
    else if (absZ >= 2) analysis = `ŌitaはZ-Score ${{z.toFixed(2)}}σで異常な気象条件を示しています。`;
    else analysis = `Ōitaの今日の天気はZ-Score ${{z.toFixed(2)}}σで通常の範囲内です。`;
    document.getElementById('analysis').textContent = analysis;
  } catch(e) {
    document.getElementById('analysis').textContent = 'データは現在利用できません。';
  }
}
load();
</script>
</body>
</html>
