<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Intelligence Reports | WeatherArb</title>
<meta name="description" content="Archivio analisi WeatherArb — anomalie meteo rilevate in Europa in tempo reale.">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0f1117;--paper:#f5f3ee;--storm:#1a3a5c;--electric:#2563eb;--mist:#e8e5de;--muted:#6b6560}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink)}
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid var(--mist);background:rgba(245,243,238,.95);position:sticky;top:0;z-index:100}
.logo{font-family:'Instrument Serif',serif;font-size:20px;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink)}
.logo-icon{width:28px;height:28px;background:var(--storm);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.nav-links{display:flex;gap:16px}
.nav-links a{font-size:13px;color:var(--muted);text-decoration:none}
.nav-links a:hover{color:var(--ink)}
.container{max-width:820px;margin:0 auto;padding:48px 24px}
h1{font-family:'Instrument Serif',serif;font-size:42px;margin-bottom:8px;letter-spacing:-1px}
.sub{font-size:15px;color:var(--muted);margin-bottom:32px}
.filters{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1px solid var(--mist);border-radius:6px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--electric);border-color:var(--electric);color:white}
.list{display:flex;flex-direction:column;gap:10px}
.article-row{display:flex;justify-content:space-between;align-items:center;gap:16px;background:white;border-radius:12px;padding:18px 24px;border:1px solid var(--mist);text-decoration:none;color:inherit;transition:all .2s}
.article-row:hover{transform:translateX(4px);border-color:#93c5fd}
.ar-left{flex:1;min-width:0}
.ar-tag{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.ar-title{font-family:'Instrument Serif',serif;font-size:17px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ar-date{font-size:11px;color:var(--muted);margin-top:4px}
.ar-right{text-align:right;white-space:nowrap}
.ar-z{font-family:'Instrument Serif',serif;font-size:22px;line-height:1}
.ar-badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:4px;text-transform:uppercase;margin-top:4px;display:inline-block}
.badge-critical{background:rgba(239,68,68,.1);color:#ef4444}
.badge-extreme{background:rgba(249,115,22,.1);color:#f97316}
.badge-unusual{background:rgba(217,119,6,.1);color:#d97706}
.badge-normal{background:rgba(37,99,235,.08);color:#2563eb}
.skeleton{background:linear-gradient(90deg,#f0ede8 25%,#e8e5de 50%,#f0ede8 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px;height:72px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
footer{text-align:center;font-size:12px;color:var(--muted);padding:32px;border-top:1px solid var(--mist);margin-top:48px}
@media(max-width:600px){nav{padding:14px 16px}.container{padding:24px 16px}.ar-title{font-size:14px}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo"><div class="logo-icon">⛈</div>WeatherArb</a>
  <div class="nav-links">
    <a href="/data/">Data</a>
    <a href="/map.html">Map</a>
    <a href="/alerts.html">Alerts</a>
    <a href="/api.html">API</a>
  </div>
</nav>
<div class="container">
  <h1>Intelligence Reports</h1>
  <p class="sub" id="sub-text">Caricamento...</p>
  <div class="filters">
    <button class="filter-btn active" onclick="filterLevel('all',this)">All</button>
    <button class="filter-btn" onclick="filterLevel('CRITICAL',this)">🔴 Critical</button>
    <button class="filter-btn" onclick="filterLevel('EXTREME',this)">🟠 Extreme</button>
    <button class="filter-btn" onclick="filterLevel('UNUSUAL',this)">🟡 Unusual</button>
  </div>
  <div class="list" id="articles-list">
    <div class="skeleton"></div>
    <div class="skeleton" style="animation-delay:.1s"></div>
    <div class="skeleton" style="animation-delay:.2s"></div>
    <div class="skeleton" style="animation-delay:.3s"></div>
    <div class="skeleton" style="animation-delay:.4s"></div>
  </div>
</div>
<footer>WeatherArb · ERA5-Land ECMWF + NASA POWER + OpenWeatherMap</footer>

<script>
var allReports = [];
var activeLevel = 'all';
var COLORS = {CRITICAL:'#ef4444',EXTREME:'#f97316',UNUSUAL:'#d97706',NORMAL:'#2563eb'};

function render(){
  var data = allReports.filter(function(a){
    return activeLevel === 'all' || a.anomaly_level === activeLevel;
  });
  var list = document.getElementById('articles-list');
  if(!data.length){
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Nessun articolo per questo filtro.</div>';
    return;
  }
  list.innerHTML = data.map(function(a){
    var color = COLORS[a.anomaly_level] || '#d97706';
    var lv = (a.anomaly_level||'').toLowerCase();
    var z = (a.z_score>=0?'+':'')+Number(a.z_score).toFixed(1);
    var date = a.date ? new Date(a.date).toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'}) : '';
    return '<a href="'+a.url+'" class="article-row">'
      +'<div class="ar-left">'
      +'<div class="ar-tag" style="color:'+color+'">'+a.provincia+' · '+(a.evento||'').replace(/_/g,' ')+'</div>'
      +'<div class="ar-title">'+a.title+'</div>'
      +'<div class="ar-date">'+date+'</div>'
      +'</div>'
      +'<div class="ar-right">'
      +'<div class="ar-z" style="color:'+color+'">Z='+z+'</div>'
      +'<div class="ar-badge badge-'+lv+'">'+a.anomaly_level+'</div>'
      +'</div>'
      +'</a>';
  }).join('');
}

function filterLevel(level, btn){
  activeLevel = level;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  render();
}

async function loadReports(){
  try{
    var r = await fetch('/data/latest_reports.json?t='+Date.now());
    var d = await r.json();
    allReports = d.reports || [];
    document.getElementById('sub-text').textContent =
      allReports.length+' analisi pubblicate · ERA5-Land + NASA POWER · Aggiornato ogni ora';
    render();
  }catch(e){
    document.getElementById('articles-list').innerHTML =
      '<div style="text-align:center;padding:40px;color:#ef4444">Errore caricamento dati.</div>';
  }
}

loadReports();
</script>
</body>
</html>
