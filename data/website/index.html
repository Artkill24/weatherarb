<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherArb — Intelligence Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --accent: #00f2ff; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #8f9bb3; }
        .serif { font-family: 'Instrument Serif', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .terminal-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .terminal-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,242,255,0.1); }
        #wa-map { height: 400px; border-radius: 20px; filter: grayscale(1) invert(1) contrast(1.2); }
    </style>
</head>
<body class="p-4 md:p-8">
    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-12 border-b border-white/5 pb-6">
        <a href="/" class="text-2xl font-bold text-white serif tracking-tight">⛈ WeatherArb<span class="text-cyan-400">.</span></a>
        <div class="space-x-8 mono text-[10px] uppercase tracking-widest">
            <a href="/data/" class="hover:text-cyan-400">Terminal</a>
            <a href="/map.html" class="hover:text-cyan-400">Global Map</a>
            <a href="/open.html" class="text-cyan-400 border border-cyan-400/30 px-3 py-1 rounded">Get API</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto grid lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-8">
            <div class="terminal-card p-10 rounded-[32px]">
                <h1 class="text-6xl text-white serif leading-none mb-6 italic">Climate Intel<br><span class="text-cyan-400">Stream.</span></h1>
                <p class="text-lg opacity-60 max-w-md mb-8">Analisi statistica in tempo reale su 121 nodi europei. Baseline NASA POWER 2000-2024.</p>
                <div class="flex gap-12 border-t border-white/5 pt-8">
                    <div><div class="text-2xl text-white mono font-bold">121</div><div class="text-[10px] uppercase tracking-tighter opacity-40">Active Nodes</div></div>
                    <div><div class="text-2xl text-white mono font-bold">14</div><div class="text-[10px] uppercase tracking-tighter opacity-40">Countries</div></div>
                    <div><div class="text-2xl text-cyan-400 mono font-bold">NASA</div><div class="text-[10px] uppercase tracking-tighter opacity-40">Data Integrity</div></div>
                </div>
            </div>

            <div class="terminal-card p-2 rounded-[32px] overflow-hidden">
                <div id="wa-map"></div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="mono text-xs font-bold text-white tracking-widest uppercase">Latest Signals</h2>
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
            </div>
            <div id="reports-feed" class="space-y-4">
                </div>
            <a href="/news/" class="block text-center p-4 border border-white/5 rounded-2xl text-xs mono hover:bg-white/5 transition-all uppercase tracking-widest">Access Archive</a>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        async function loadFeed() {
            try {
                const res = await fetch('/data/latest_reports.json');
                const data = await res.json();
                document.getElementById('reports-feed').innerHTML = data.reports.slice(0, 5).map(r => `
                    <a href="${r.url}" class="block terminal-card p-6 rounded-2xl group">
                        <div class="text-[10px] mono text-cyan-400 mb-2 uppercase tracking-tighter">${r.provincia} // Z-SCORE ${r.z_score}</div>
                        <div class="text-white font-medium group-hover:text-cyan-400 transition-colors">${r.title}</div>
                    </a>
                `).join('');
            } catch(e) { console.error(e); }
        }

        function initMap() {
            var map = L.map('wa-map', { zoomControl: false }).setView([48, 10], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            fetch('https://api.weatherarb.com/api/v1/europe/top?limit=100')
                .then(r => r.json()).then(d => {
                    d.data.forEach(p => {
                        if (p.lat && p.lon) {
                            var col = p.anomaly_level === 'CRITICAL' ? '#ff0044' : '#00f2ff';
                            L.circleMarker([p.lat, p.lon], { radius: 5, color: col, fillOpacity: 0.8 }).addTo(map);
                        }
                    });
                });
        }
        window.onload = () => { loadFeed(); initMap(); };
    </script>
</body>
</html>
