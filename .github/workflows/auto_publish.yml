name: WeatherArb Auto-Publish

on:
  schedule:
    - cron: '0 */6 * * *'   # ogni 6 ore
  workflow_dispatch:          # run manuale da GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run auto_publish
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_BASE: https://api.weatherarb.com
          SCORE_THRESHOLD: '3.0'
          MAX_ARTICLES: '6'
          KEEP_DAYS: '30'
          MAX_TOTAL: '50'
        run: python tools/auto_publish.py

      - name: Commit & push if changed
        run: |
          git config user.name "WeatherArb Bot"
          git config user.email "bot@weatherarb.com"
          git add data/blog_posts/ data/website/news/ data/website/data/latest_reports.json
          git diff --staged --quiet || git commit -m "auto: publish weather intelligence reports $(date -u +%Y-%m-%d)"
          git pull --rebase origin main && git push

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd data/website
          npx wrangler deploy
      - name: Send alerts
        env:
          API_BASE: https://api.weatherarb.com
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python tools/send_alerts.py
