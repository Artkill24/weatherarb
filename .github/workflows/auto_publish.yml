name: WeatherArb Auto-Publish
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run auto_publish
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}
          API_BASE: https://api.weatherarb.com
          SCORE_THRESHOLD: '5.0'
          MAX_ARTICLES: '8'
          KEEP_DAYS: '30'
          MAX_TOTAL: '50'
        run: python tools/auto_publish.py
      - name: Commit & push if changed
        run: |
          git config user.name "WeatherArb Bot"
          git config user.email "bot@weatherarb.com"
          git add data/blog_posts/ data/website/news/ data/website/data/latest_reports.json
          git diff --staged --quiet || git commit -m "auto: publish weather intelligence reports $(date -u +%Y-%m-%d)"
          git push
