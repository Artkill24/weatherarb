name: Update Content

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests python-slugify
      - name: Generate content
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 tools/auto_publish.py
      - name: Push changes
        run: |
          git config user.email "bot@weatherarb.com"
          git config user.name "WeatherArb Bot"
          git add data/website/data/ data/website/sitemap.xml || true
          git diff --staged --quiet || git commit -m "Auto-update $(date -u +%Y-%m-%dT%H:%M)"
          git push
