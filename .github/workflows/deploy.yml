name: Update Content

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-slugify

      - name: Generate latest content
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 tools/auto_publish.py

      - name: Commit and push updated content
        run: |
          git config user.email "action@github.com"
          git config user.name "WeatherArb Bot"
          git add data/website/data/
          git add data/website/sitemap.xml
          git diff --staged --quiet || git commit -m "Auto-update content $(date -u +%Y-%m-%d-%H%M)"
          git push
